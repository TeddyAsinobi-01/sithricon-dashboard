<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ithri - Dashboard</title>
<link rel="stylesheet" href="shared/style.css">
<style>
  .stock-profile {
    background: linear-gradient(135deg, var(--green-dark), var(--green-main));
    border-radius: var(--radius);
    padding: 16px;
    color: var(--white);
    margin-bottom: 16px;
  }
  .stock-profile h3 { color: var(--yellow-bright); margin-bottom: 10px; font-size: 1rem; }
  .stock-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.15);
    font-size: 0.9rem;
  }
  .stock-row:last-child { border-bottom: none; }
  .stock-row .qty { font-weight: 800; font-size: 1.1rem; color: var(--yellow-bright); }
  .stock-row .qty.low { color: #ff6b6b; }
  .stock-bar {
    width: 100%;
    height: 6px;
    background: rgba(255,255,255,0.2);
    border-radius: 3px;
    margin-top: 4px;
    overflow: hidden;
  }
  .stock-bar-fill {
    height: 100%;
    border-radius: 3px;
    background: var(--yellow-bright);
    transition: width 0.5s;
  }
  .stock-bar-fill.low { background: #ff6b6b; }
</style>
</head>
<body class="has-bottom-nav">
<header class="app-header">
  <h1><span class="logo-mark">Ithri</span> <span id="locName">Location</span></h1>
  <span style="font-size:0.8rem; cursor:pointer;" onclick="logout()">Logout</span>
</header>

<div class="container">

  <div id="offDayBanner" class="alert success hidden">
    🎉 Today is your off day. No clock-in or stock entry needed.
  </div>

  <!-- Stock Profile Card -->
  <div class="stock-profile">
    <h3>📦 Current Available Stock</h3>
    <div id="stockProfile"><div style="opacity:0.7; font-size:0.9rem;">Loading stock...</div></div>
  </div>

  <!-- Clock In/Out Card -->
  <div id="clockCard" class="card">
    <h2>Attendance</h2>
    <p style="color:var(--gray); font-size:0.85rem; margin-bottom:10px;" id="dateLabel">Loading date...</p>

    <div id="clockInSection">
      <label>Clock-In Photo (take a photo at your location)</label>
      <input type="file" accept="image/*" capture="environment" id="clockInPhoto">
      <img id="clockInPreview" class="photo-preview hidden">
      <button class="btn yellow" onclick="submitClockIn()">Clock In</button>
    </div>

    <div id="clockedInInfo" class="hidden">
      <div class="alert success">
        ✅ Clocked in at <strong id="clockInTimeDisplay"></strong>
      </div>
    </div>

    <div id="clockOutSection" class="hidden" style="margin-top:14px;">
      <label>Clock-Out Photo</label>
      <input type="file" accept="image/*" capture="environment" id="clockOutPhoto">
      <img id="clockOutPreview" class="photo-preview hidden">
      <button class="btn outline" onclick="submitClockOut()">Clock Out</button>
    </div>

    <div id="clockedOutInfo" class="hidden">
      <div class="alert success">
        ✅ Clocked out at <strong id="clockOutTimeDisplay"></strong>. Don't forget to record your closing stock.
      </div>
    </div>
  </div>

  <!-- Quick links -->
  <div class="card">
    <h2>Today's Tasks</h2>
    <div style="display:flex; flex-direction:column; gap:10px;">
      <a href="stock.html" style="text-decoration:none;"><button class="btn">📦 Record Stock & Sales</button></a>
      <a href="history.html" style="text-decoration:none;"><button class="btn outline">📋 View My History</button></a>
    </div>
  </div>

</div>

<div class="bottom-nav">
  <div class="nav-item active"><span class="icon">🏠</span>Home</div>
  <a href="stock.html" style="text-decoration:none; flex:1;"><div class="nav-item"><span class="icon">📦</span>Stock</div></a>
  <a href="history.html" style="text-decoration:none; flex:1;"><div class="nav-item"><span class="icon">📋</span>History</div></a>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script>
const session = getSession();
if (!session.locationId) window.location.href = 'index.html';
document.getElementById('locName').textContent = session.locationName;

const today = todayStr();
const todayDow = dayOfWeek();
let locationData = null;
let todayLog = null;

function logout() {
  clearSession();
  window.location.href = 'index.html';
}

async function init() {
  document.getElementById('dateLabel').textContent = new Date().toLocaleDateString('en-GB', {
    weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
  });

  // Real-time listener on location doc for live stock updates
  db.collection('locations').doc(session.locationId).onSnapshot(doc => {
    locationData = doc.data();
    renderStockProfile(locationData.currentStock || {}, locationData.products || {});

    // Check off day
    if (locationData.offDays && locationData.offDays.includes(todayDow)) {
      document.getElementById('offDayBanner').classList.remove('hidden');
      document.getElementById('clockCard').classList.add('hidden');
    }
  });

  // Check today's log for clock state
  const logRef = db.collection('locations').doc(session.locationId).collection('logs').doc(today);
  const logDoc = await logRef.get();
  todayLog = logDoc.exists ? logDoc.data() : null;
  renderClockState();
}

function renderStockProfile(currentStock, suppliedStock) {
  const el = document.getElementById('stockProfile');
  const products = Object.keys(currentStock).length > 0 ? currentStock : suppliedStock;

  if (Object.keys(products).length === 0) {
    el.innerHTML = '<div style="opacity:0.7; font-size:0.9rem;">No stock assigned yet. Contact your admin.</div>';
    return;
  }

  el.innerHTML = Object.entries(products).map(([product, qty]) => {
    const supplied = suppliedStock[product] || qty;
    const pct = supplied > 0 ? Math.round((qty / supplied) * 100) : 100;
    const isLow = pct <= 20;
    return `
      <div class="stock-row">
        <div>
          <div>${product}</div>
          <div class="stock-bar">
            <div class="stock-bar-fill ${isLow ? 'low' : ''}" style="width:${Math.min(pct,100)}%"></div>
          </div>
        </div>
        <div style="text-align:right; margin-left:12px;">
          <span class="qty ${isLow ? 'low' : ''}">${qty}</span>
          <div style="font-size:0.7rem; opacity:0.7;">of ${supplied} (${pct}%)</div>
        </div>
      </div>`;
  }).join('');
}

function renderClockState() {
  const clockInSection = document.getElementById('clockInSection');
  const clockedInInfo = document.getElementById('clockedInInfo');
  const clockOutSection = document.getElementById('clockOutSection');
  const clockedOutInfo = document.getElementById('clockedOutInfo');

  if (todayLog && todayLog.clockIn) {
    clockInSection.classList.add('hidden');
    clockedInInfo.classList.remove('hidden');
    document.getElementById('clockInTimeDisplay').textContent = todayLog.clockIn;

    if (todayLog.clockOut) {
      clockOutSection.classList.add('hidden');
      clockedOutInfo.classList.remove('hidden');
      document.getElementById('clockOutTimeDisplay').textContent = todayLog.clockOut;
    } else {
      clockOutSection.classList.remove('hidden');
    }
  }
}

document.getElementById('clockInPhoto').addEventListener('change', (e) => previewImage(e, 'clockInPreview'));
document.getElementById('clockOutPhoto').addEventListener('change', (e) => previewImage(e, 'clockOutPreview'));

function previewImage(e, previewId) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = document.getElementById(previewId);
    img.src = ev.target.result;
    img.classList.remove('hidden');
  };
  reader.readAsDataURL(file);
}

async function submitClockIn() {
  const fileInput = document.getElementById('clockInPhoto');
  const file = fileInput.files[0];
  if (!file) { alert('Please take a clock-in photo first.'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Uploading...';

  try {
    const meta = await getImageMetadata(file);
    const photoUrl = await uploadImage(file, `clockins/${session.locationId}/${today}_in.jpg`);

    const logRef = db.collection('locations').doc(session.locationId).collection('logs').doc(today);
    await logRef.set({
      date: today,
      locationId: session.locationId,
      locationName: session.locationName,
      clockIn: meta.time,
      clockInDate: meta.date,
      clockInPhoto: photoUrl,
      status: 'in_progress'
    }, { merge: true });

    todayLog = { clockIn: meta.time };
    renderClockState();
  } catch (e) {
    alert('Failed to clock in. Check your connection and try again.');
    console.error(e);
    btn.disabled = false; btn.textContent = 'Clock In';
  }
}

async function submitClockOut() {
  const fileInput = document.getElementById('clockOutPhoto');
  const file = fileInput.files[0];
  if (!file) { alert('Please take a clock-out photo first.'); return; }

  const btn = event.target;
  btn.disabled = true; btn.textContent = 'Uploading...';

  try {
    const meta = await getImageMetadata(file);
    const photoUrl = await uploadImage(file, `clockouts/${session.locationId}/${today}_out.jpg`);

    const logRef = db.collection('locations').doc(session.locationId).collection('logs').doc(today);
    await logRef.set({
      clockOut: meta.time,
      clockOutDate: meta.date,
      clockOutPhoto: photoUrl
    }, { merge: true });

    todayLog.clockOut = meta.time;
    renderClockState();
  } catch (e) {
    alert('Failed to clock out. Check your connection and try again.');
    console.error(e);
    btn.disabled = false; btn.textContent = 'Clock Out';
  }
}

init();
</script>
</body>
</html>
