<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Department Selection</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #f3f4f6;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 80px;
        }

        h1 {
            color: #333;
            margin-bottom: 10px;
        }

        h3 {
            color: #666;
            font-weight: 400;
            margin-bottom: 50px;
        }

        .department-card {
            background: #ffffff;
            width: 350px;
            padding: 30px;
            border-radius: 5px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.12);
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .department-link {
            text-decoration: none;
            color: #333;
            background: #f8f9fa;
            border: 1px solid #ddd;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            font-weight: 600;
            transition: all 0.3s ease;
        }

        .department-link:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <h1>Welcome,</h1>
    <h3>Please select your department</h3>

    <div class="department-card">
        <a href="admin.html" class="department-link">HR Manager</a>
        <a href="merchandiser.html" class="department-link">Merchandiser</a>
    </div>

</body>
</html>
