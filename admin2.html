<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ithri Admin - Login</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body>
<header class="app-header">
  <h1><span class="logo-mark">Ithri</span> Admin Portal</h1>
</header>

<div class="container" style="max-width:400px; margin-top:60px;">
  <div class="card">
    <h2>Admin Login</h2>
    <label>Company Password</label>
    <input type="password" id="adminPassword" placeholder="Enter password">
    <div id="loginError" class="alert error hidden">Incorrect password.</div>
    <div id="setupBox" class="alert warn hidden">
      No admin password has been set yet. The password you enter now will become the admin password.
    </div>
    <button class="btn yellow" onclick="login()">Login</button>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>

<script src="shared/firebase-config.js"></script>

<script>
async function checkSetup() {
  const settingsDoc = await db.collection('admin').doc('settings').get();
  if (!settingsDoc.exists || !settingsDoc.data().companyPassword) {
    document.getElementById('setupBox').classList.remove('hidden');
  }
}

async function login() {
  const entered = document.getElementById('adminPassword').value.trim();
  if (!entered) return;

  const settingsRef = db.collection('admin').doc('settings');
  const settingsDoc = await settingsRef.get();

  if (!settingsDoc.exists || !settingsDoc.data().companyPassword) {
    // First time setup - set this as the password
    await settingsRef.set({ companyPassword: entered }, { merge: true });
    sessionStorage.setItem('ithri_admin_auth', 'true');
    window.location.href = 'dashboard.html';
    return;
  }

  if (entered === settingsDoc.data().companyPassword) {
    sessionStorage.setItem('ithri_admin_auth', 'true');
    window.location.href = 'dashboard.html';
  } else {
    document.getElementById('loginError').classList.remove('hidden');
  }
}

document.getElementById('adminPassword').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') login();
});

checkSetup();
</script>
</body>
</html>
