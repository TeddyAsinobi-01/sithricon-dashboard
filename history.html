<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ithri - My History</title>
<link rel="stylesheet" href="shared/style.css">
</head>
<body class="has-bottom-nav">
<header class="app-header">
  <h1><span class="logo-mark">Ithri</span> My History</h1>
  <span style="font-size:0.8rem; cursor:pointer;" onclick="window.location.href='dashboard.html'">Home</span>
</header>

<div class="container">

  <div class="tabs">
    <div class="tab active" data-tab="sales">Sales History</div>
    <div class="tab" data-tab="supply">Supply History</div>
  </div>

  <div id="tab-sales" class="tab-content">
    <div class="stat-grid" style="margin-bottom:16px;">
      <div class="stat-box"><div class="num" id="totalDays">-</div><div class="label">Days Recorded</div></div>
      <div class="stat-box"><div class="num" id="totalSold">-</div><div class="label">Total Units Sold</div></div>
      <div class="stat-box"><div class="num" id="totalFlagged">-</div><div class="label">Flagged Days</div></div>
    </div>
    <div id="historyList"><div class="card"><p>Loading...</p></div></div>
  </div>

  <div id="tab-supply" class="tab-content hidden">
    <div id="supplyList"><div class="card"><p>Loading...</p></div></div>
  </div>

</div>

<div class="bottom-nav">
  <a href="dashboard.html" style="text-decoration:none; flex:1;"><div class="nav-item"><span class="icon">🏠</span>Home</div></a>
  <a href="stock.html" style="text-decoration:none; flex:1;"><div class="nav-item"><span class="icon">📦</span>Stock</div></a>
  <div class="nav-item active"><span class="icon">📋</span>History</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-storage-compat.js"></script>
<script src="shared/firebase-config.js"></script>
<script>
const session = getSession();
if (!session.locationId) window.location.href = 'index.html';

document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.add('hidden'));
    tab.classList.add('active');
    document.getElementById(`tab-${tab.dataset.tab}`).classList.remove('hidden');
  });
});

async function loadSalesHistory() {
  const snap = await db.collection('locations').doc(session.locationId)
    .collection('logs').orderBy('date', 'desc').limit(30).get();

  const listEl = document.getElementById('historyList');
  if (snap.empty) {
    listEl.innerHTML = '<div class="card"><div class="empty-state">No records yet.</div></div>';
    document.getElementById('totalDays').textContent = 0;
    document.getElementById('totalSold').textContent = 0;
    document.getElementById('totalFlagged').textContent = 0;
    return;
  }

  let totalSoldUnits = 0, totalFlagged = 0, totalDays = 0, html = '';

  snap.forEach(doc => {
    const d = doc.data();
    totalDays++;
    if (d.status === 'flagged') totalFlagged++;
    const daySold = d.soldQty ? Object.values(d.soldQty).reduce((a, b) => a + b, 0) : 0;
    totalSoldUnits += daySold;

    let statusBadge = '<span class="badge gray">Pending</span>';
    if (d.status === 'submitted') statusBadge = '<span class="badge green">Submitted</span>';
    if (d.status === 'flagged') statusBadge = '<span class="badge red">Flagged</span>';

    const products = d.soldQty ? Object.keys(d.soldQty) : [];
    const productRows = products.map(p => `
      <div class="product-row">
        <span>${p}</span>
        <span>Sold: <strong>${d.soldQty[p]}</strong> &nbsp;|&nbsp; Closing: <strong>${d.closingStock?.[p] ?? '-'}</strong>
        ${d.discrepancy?.[p] ? ` &nbsp;<span style="color:var(--red)">⚠️ diff: ${d.discrepancy[p].diff > 0 ? '+' : ''}${d.discrepancy[p].diff}</span>` : ''}</span>
      </div>`).join('');

    const cardClass = d.status === 'flagged' ? 'flagged' : d.status === 'submitted' ? '' : 'pending';

    html += `
      <div class="history-card ${cardClass}">
        <div class="flex-between"><div style="font-weight:700; color:var(--green-dark);">📅 ${d.date}</div>${statusBadge}</div>
        <div style="font-size:0.8rem; color:var(--gray); margin:6px 0;">🕐 In: ${d.clockIn || '-'} &nbsp;|&nbsp; Out: ${d.clockOut || '-'}</div>
        ${products.length > 0 ? `
          <div style="margin-bottom:4px; font-size:0.8rem; font-weight:600; color:var(--green-dark);">PRODUCTS</div>
          ${productRows}
          <div style="background:var(--light-gray); border-radius:8px; padding:10px; margin-top:8px; font-size:0.875rem;">Total sold today: <strong>${daySold} units</strong></div>`
          : '<div style="color:var(--gray); font-size:0.85rem;">No stock report submitted.</div>'}
        ${d.discrepancyReason ? `<div class="alert warn" style="margin-top:8px; font-size:0.85rem;"><strong>Discrepancy reason:</strong> ${d.discrepancyReason}</div>` : ''}
        ${d.hasLowStock ? `<div class="alert warn" style="margin-top:8px; font-size:0.85rem;">📉 Low stock alert was raised on this day.</div>` : ''}
      </div>`;
  });

  document.getElementById('totalDays').textContent = totalDays;
  document.getElementById('totalSold').textContent = totalSoldUnits;
  document.getElementById('totalFlagged').textContent = totalFlagged;
  listEl.innerHTML = html;
}

async function loadSupplyHistory() {
  const listEl = document.getElementById('supplyList');
  const snap = await db.collection('supplyRequests')
    .where('locationId', '==', session.locationId)
    .orderBy('createdAt', 'desc')
    .limit(30)
    .get();

  if (snap.empty) {
    listEl.innerHTML = '<div class="card"><div class="empty-state">No supply records yet.</div></div>';
    return;
  }

  let html = '';
  snap.forEach(doc => {
    const d = doc.data();
    const date = d.createdAt ? new Date(d.createdAt.toDate()).toLocaleString('en-GB') : '-';

    let statusBadge = '<span class="badge gray">Pending</span>';
    if (d.status === 'confirmed') statusBadge = '<span class="badge green">Confirmed</span>';
    if (d.status === 'disputed') statusBadge = '<span class="badge red">Disputed</span>';
    if (d.status === 'cancelled') statusBadge = '<span class="badge red">Cancelled</span>';
    if (d.status === 'pending_confirmation') statusBadge = '<span class="badge yellow">Awaiting Your Confirmation</span>';

    const itemRows = Object.entries(d.items || {}).map(([p, q]) => `
      <div class="product-row"><span>${p}</span><span><strong>+${q} units</strong></span></div>`).join('');

    html += `
      <div class="history-card supply">
        <div class="flex-between"><div style="font-weight:700; color:#1565C0;">📦 Supply Record</div>${statusBadge}</div>
        <div style="font-size:0.8rem; color:var(--gray); margin:6px 0;">${date}</div>
        ${itemRows}
      </div>`;
  });

  listEl.innerHTML = html;
}

loadSalesHistory();
loadSupplyHistory();
</script>
</body>
</html>
